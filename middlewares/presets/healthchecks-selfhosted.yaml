name: healthchecks-selfhosted
description: "Healthchecks.io self-hosted Ping API preset using full URL via simple HTTP pings with optional log suffix (success/fail)"
version: "1.0.0"

url_scheme: "{url}"

method: POST

headers:
  Content-Type: "text/plain; charset=utf-8"

variables:
  url:
    description: >
      use {url} to configure the full ping url with optionally suffix like /fail or /<exit-status>
      # example: https://health.domain.com/ping/731c8c4e-32dd-49fd-a20b-3a8bcf6233f9
      # example: https://health.domain.com/ping/731c8c4e-32dd-49fd-a20b-3a8bcf6233f9/start
      # healthchecks.io docs for suffix: https://healthchecks.io/docs/signaling_failures/
    required: true

body: |

  Job:      {{ .Job.Name }}
  Status:   {{if .Execution.Failed}}🔴{{else if .Execution.Skipped}}🟡{{else}}🟢{{end}} {{.Execution.Status}}
  Duration: {{ formatDuration .Execution.Duration }}
  Schedule: {{ .Job.Schedule }}
  Command:  {{ .Job.Command }}

  Started:  {{ isoTime .Execution.StartTime }}
  Ended:    {{ isoTime .Execution.EndTime }}

  Host:     {{ .Host.Hostname }}
  Ofelia:   {{ .Ofelia.Version }}

  {{- if .Execution.Failed }}
  Error:    {{ .Execution.Error }}
  {{- end }}

  {{- if .Preset.Link }}
  Link:     {{ .Preset.LinkText }} -> {{ .Preset.Link }}
  {{- end }}
